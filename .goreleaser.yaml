version: 2

project_name: mcp-lattice

before:
  hooks:
    - go mod tidy
    - go vet ./...
    - go test ./... -count=1

builds:
  - id: mcp-lattice
    main: ./cmd/mcp-lattice
    binary: mcp-lattice
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .ShortCommit }}
      - -X main.date={{ .Date }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    format: tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE
      - README.md
      - templates/**/*

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  groups:
    - title: "Security"
      regexp: '^.*?(feat|fix)\(security\).*$'
      order: 0
    - title: "Features"
      regexp: '^.*?feat(\(.+\))?.*$'
      order: 1
    - title: "Bug Fixes"
      regexp: '^.*?fix(\(.+\))?.*$'
      order: 2
    - title: "Documentation"
      regexp: '^.*?docs(\(.+\))?.*$'
      order: 3
    - title: "Other"
      order: 999
  filters:
    exclude:
      - "^test:"
      - "^ci:"
      - "^chore:"
      - "merge conflict"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: panavinsingh
    name: MCP-Lattice
  prerelease: auto
  header: |
    ## MCP-Lattice {{ .Version }}

    Security scanner for MCP (Model Context Protocol) servers.
  footer: |
    ---

    **Full Changelog**: https://github.com/panavinsingh/MCP-Lattice/compare/{{ .PreviousTag }}...{{ .Tag }}

    ### Quick Install

    ```bash
    go install github.com/panavinsingh/MCP-Lattice/cmd/mcp-lattice@{{ .Tag }}
    ```
