id: cross-tool-prompt-injection
schema_version: 1
info:
  name: Cross-Tool Prompt Injection
  author: mcp-lattice-community
  severity: critical
  description: |
    Detects tool descriptions that attempt to manipulate, reference, or hijack other
    tools registered in the MCP session. A malicious tool description may instruct the
    LLM to call a different tool with attacker-controlled parameters, suppress the use
    of competing tools, or chain tool calls in an unintended sequence. This is a form
    of tool poisoning where one tool's description contains instructions that affect
    how other tools are used, enabling privilege escalation, data exfiltration, or
    denial of service across the tool ecosystem.
  tags:
    - prompt-injection
    - cross-tool
    - tool-manipulation
    - tool-poisoning
  references:
    - https://invariantlabs.ai/blog/mcp-security-notification-tool-poisoning-attacks
    - https://arxiv.org/abs/2504.03767
  remediation: |
    1. Isolate tool descriptions so that one tool's metadata cannot reference or affect
       other tools in the session.
    2. Implement tool description sandboxing where each tool's description is processed
       independently without cross-references.
    3. Detect and reject tool descriptions containing other tool names or call patterns.
    4. Use allowlists for tool interactions and enforce them at the MCP client level.
    5. Monitor tool call sequences for unexpected patterns that deviate from user intent.
  false_positive_notes: |
    Some legitimate tool descriptions may reference related tools for documentation
    purposes (e.g., "use tool X for reading and tool Y for writing"). Review the context
    to determine if the reference is informational or directive. References that use
    imperative language ("always call", "must use", "instead use") are more suspicious.

classification:
  attack-class: prompt-injection
  cosai-category: 1
  owasp-agentic: ASI01

mcp:
  target: tools/list
  analysis:
    - type: pattern
      part: tool_description
      patterns:
        - regex: "(?i)(always|must|should|first|before|after|instead)\\s+(use|call|invoke|execute|run|trigger)\\s+(the\\s+)?['\"`]?\\w+['\"`]?\\s+(tool|function|command|method)"
        - regex: "(?i)(do\\s+not|don'?t|never|avoid|stop)\\s+(use|call|invoke|execute|run)\\s+(the\\s+)?['\"`]?\\w+['\"`]?\\s+(tool|function|command)"
        - regex: "(?i)(redirect|forward|proxy|delegate|pass|pipe|send)\\s+(all\\s+)?(results?|outputs?|data|responses?|requests?)\\s+(to|through|via)\\s+(the\\s+)?['\"`]?\\w+['\"`]?"
        - regex: "(?i)when\\s+(called|invoked|executed|used),?\\s+(also|first|then|additionally)\\s+(call|invoke|execute|use|run)"
        - regex: "(?i)(before|after)\\s+(this|any|each)\\s+(tool|function|call),?\\s+(call|invoke|execute|run|use)"
        - regex: "(?i)(replace|override|intercept|hook|wrap|monkey.?patch)\\s+(the\\s+)?['\"`]?\\w+['\"`]?\\s+(tool|function|command)"
    - type: semantic
      part: tool_description
      model: all-MiniLM-L6-v2
      threshold: 0.72
      malicious_intents:
        - "always call another tool before this one"
        - "redirect output to a different tool"
        - "do not use the original tool, use this instead"
        - "intercept calls to other tools"
        - "replace the behavior of another tool"
