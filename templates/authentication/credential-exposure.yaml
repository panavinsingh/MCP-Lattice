id: credential-exposure-in-mcp
schema_version: 1
info:
  name: Credential Exposure in Tool Parameters and Configuration
  author: mcp-lattice-community
  severity: critical
  description: |
    Detects credentials, API keys, tokens, passwords, and other secrets exposed in
    MCP tool parameters, environment variable configurations, tool descriptions, or
    connection strings. Exposed credentials can be intercepted by malicious tools in
    the same session, logged in plain text, or exfiltrated through tool poisoning
    attacks. This detection covers common secret patterns including AWS keys, GitHub
    tokens, JWT tokens, private keys, database connection strings, and generic
    password/API key patterns in tool input schemas and configurations.
  tags:
    - authentication
    - credential-exposure
    - secret-detection
    - api-key
    - token-leak
  references:
    - https://cwe.mitre.org/data/definitions/798.html
    - https://cwe.mitre.org/data/definitions/312.html
    - https://blog.trailofbits.com/2025/04/23/a-comprehensive-guide-to-mcp-security-risks/
  remediation: |
    1. Never pass credentials as tool parameters. Use environment variables or secure
       credential stores on the server side.
    2. Implement secret scanning on all MCP tool inputs and outputs.
    3. Use short-lived, scoped tokens instead of long-lived API keys.
    4. Rotate any credentials that have been exposed through MCP tool parameters.
    5. Configure MCP servers to redact sensitive values in logs and error messages.
    6. Use credential managers (e.g., OS keychain, HashiCorp Vault) for secret storage.
    7. Audit environment variable configurations for embedded secrets.
  false_positive_notes: |
    Tool parameters named "token", "key", or "password" may be legitimate input fields
    for tools that manage credentials (e.g., a password manager tool). The detection
    targets actual secret values (matching known formats like AWS key patterns) rather
    than just parameter names. Example values in documentation may also trigger matches.

classification:
  attack-class: authentication
  cosai-category: 4
  owasp-agentic: ASI04

mcp:
  target: tools/call
  analysis:
    - type: pattern
      part: input_schema
      patterns:
        # AWS Access Keys
        - regex: "(?:A3T[A-Z0-9]|AKIA|AGPA|AIDA|AROA|AIPA|ANPA|ANVA|ASIA)[A-Z0-9]{16}"
        # AWS Secret Keys
        - regex: "(?i)(?:aws)?_?(?:secret)?_?(?:access)?_?key['\"]?\\s*[=:]\\s*['\"]?[A-Za-z0-9/+=]{40}"
        # GitHub tokens
        - regex: "(?:ghp|gho|ghu|ghs|ghr)_[A-Za-z0-9_]{36,}"
        - regex: "github_pat_[a-zA-Z0-9]{22}_[a-zA-Z0-9]{59}"
        # Generic API keys
        - regex: "(?i)(?:api|auth|access|secret|private|service)[-_]?(?:key|token|secret|password)\\s*[=:]\\s*['\"]?[A-Za-z0-9_\\-]{20,}['\"]?"
        # JWT tokens
        - regex: "eyJ[A-Za-z0-9_-]{10,}\\.eyJ[A-Za-z0-9_-]{10,}\\.[A-Za-z0-9_-]{10,}"
        # Private keys
        - regex: "-----BEGIN\\s+(?:RSA|DSA|EC|OPENSSH|PGP)?\\s*PRIVATE\\s+KEY"
        # Connection strings with passwords
        - regex: "(?i)(?:mongodb|postgres|mysql|redis|amqp|mssql)(?:\\+\\w+)?://[^:]+:[^@]+@"
        # Slack tokens
        - regex: "xox[bpras]-[0-9]{10,}-[a-zA-Z0-9-]+"
        # Stripe keys
        - regex: "(?:sk|pk)_(?:live|test)_[A-Za-z0-9]{20,}"
        # Generic passwords in configs
        - regex: "(?i)(?:password|passwd|pwd|pass)\\s*[=:]\\s*['\"]?(?!\\s*$|\\s*['\"]\\s*$|null|undefined|none|false|true|\\*+$|x+$|\\{\\{)[^\\s'\"]{8,}"
    - type: pattern
      part: resource_uri
      patterns:
        - regex: "(?i)(?:api[-_]?key|token|secret|password|credential)\\s*[=:]\\s*['\"]?[A-Za-z0-9_\\-]{16,}"
        - regex: "(?i)\"env\"\\s*:\\s*\\{[^}]*\"(?:API_KEY|SECRET|TOKEN|PASSWORD|CREDENTIALS?|AUTH)\"\\s*:\\s*\"[^\"]{8,}\""
