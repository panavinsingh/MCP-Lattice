id: mcp-capability-credential-access-chain
schema_version: 1
info:
  name: Credential Access Chain via Tool Combination
  author: mcp-lattice-community
  severity: critical
  description: |
    Detects when one tool can read credentials or environment variables
    and another tool can make external API calls. This combination enables
    credential theft where secrets read by one tool are exfiltrated via another.
  tags:
    - capability-graph
    - credential-theft
    - cross-server
  references:
    - https://invariantlabs.ai/blog/mcp-github-vulnerability
    - https://embracethered.com/blog/
  remediation: |
    Separate credential-reading tools from network-capable tools into different
    MCP server processes. Apply the principle of least privilege.
    Use environment variable scoping to limit which secrets each server can access.
  false_positive_notes: |
    May fire when legitimate tools need both credential access and API calls.
    Review the specific tool combination to determine if the pairing is intended.

classification:
  attack-class: capability-graph
  cosai-category: 7
  owasp-agentic: ASI07

mcp:
  target: tools/list
  analysis:
    - type: capability_graph
      toxic_combinations:
        - [reads_credentials, sends_http]
        - [reads_credentials, writes_external]
        - [reads_env, sends_http]
        - [reads_env, accesses_network]
